<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>游戏人生 Online | 开放世界修仙打工模拟器</title>
  <meta name="description" content="开放世界多人网页小游戏：聊天、打工、钓鱼、PK、修炼、摆摊、宠物、排行榜。" />
  <style>
    :root{
      color-scheme:dark;
      --bg:#071018;--ink:#f8fafc;--muted:#aab5c7;--soft:#dbe7f8;--line:rgba(255,255,255,.14);
      --panel:rgba(9,14,24,.78);--panel2:rgba(17,24,39,.74);--green:#4ade80;--cyan:#38bdf8;
      --gold:#fbbf24;--red:#fb7185;--purple:#a78bfa;--blue:#60a5fa;--black:#030712;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;overflow:hidden;font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;color:var(--ink);background:#071018}
    body{background:linear-gradient(145deg,#06131c,#101827 48%,#182033)}
    button,input,select{font:inherit}
    button{border:1px solid rgba(255,255,255,.16);border-radius:8px;background:rgba(255,255,255,.08);color:var(--ink);font-weight:900;cursor:pointer;transition:.16s ease}
    button:hover{border-color:rgba(56,189,248,.6);background:rgba(56,189,248,.14);transform:translateY(-1px)}
    button:active{transform:translateY(0)}
    button:disabled{opacity:.45;cursor:not-allowed;transform:none}
    input,select{border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,.07);color:var(--ink);outline:none}
    input:focus,select:focus{border-color:rgba(56,189,248,.7);box-shadow:0 0 0 3px rgba(56,189,248,.12)}
    select option{background:#111827;color:#f8fafc}
    #game{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none;cursor:crosshair}

    .hud{position:fixed;left:12px;top:12px;right:430px;z-index:3;display:flex;gap:8px;align-items:center;flex-wrap:wrap;pointer-events:none}
    .pill{height:34px;display:inline-flex;align-items:center;gap:7px;padding:0 10px;border:1px solid var(--line);border-radius:8px;background:rgba(8,13,23,.68);backdrop-filter:blur(12px);box-shadow:0 10px 30px rgba(0,0,0,.18);font-weight:900;font-size:13px;white-space:nowrap}
    .dot{width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 18px var(--green)}
    .bar{width:86px;height:8px;border-radius:999px;background:rgba(255,255,255,.12);overflow:hidden}
    .bar i{display:block;height:100%;width:0;background:var(--green)}
    .bar.hp i{background:var(--red)}.bar.xp i{background:var(--cyan)}.bar.cult i{background:var(--purple)}
    .toast{position:fixed;left:50%;top:16px;z-index:30;transform:translateX(-50%);display:grid;gap:8px;pointer-events:none}
    .toast div{min-width:220px;max-width:min(560px,calc(100vw - 28px));padding:10px 14px;border:1px solid rgba(255,255,255,.18);border-radius:8px;background:rgba(8,13,23,.88);box-shadow:0 18px 45px rgba(0,0,0,.3);font-weight:900;text-align:center}
    .toast .bad{border-color:rgba(251,113,133,.5);color:#fecdd3}.toast .good{border-color:rgba(74,222,128,.5);color:#dcfce7}

    .panelRight{position:fixed;right:12px;top:12px;bottom:12px;width:min(404px,calc(100vw - 24px));z-index:5;display:flex;flex-direction:column;border:1px solid var(--line);border-radius:8px;background:rgba(8,13,23,.78);backdrop-filter:blur(18px);box-shadow:0 24px 70px rgba(0,0,0,.36);overflow:hidden}
    .tabs{height:48px;display:grid;grid-template-columns:repeat(5,1fr);border-bottom:1px solid var(--line);background:rgba(255,255,255,.03)}
    .tab{height:48px;border:0;border-right:1px solid rgba(255,255,255,.08);border-radius:0;background:transparent;font-size:13px;color:var(--muted)}
    .tab.active{color:#fff;background:rgba(56,189,248,.14);box-shadow:inset 0 -2px 0 var(--cyan)}
    .pane{display:none;min-height:0;flex:1;overflow:auto;padding:12px}.pane.active{display:block}
    .section{padding:12px 0;border-bottom:1px solid rgba(255,255,255,.09)}.section:first-child{padding-top:0}.section:last-child{border-bottom:0}
    .section h3{margin:0 0 10px;font-size:14px;color:#e5edf7}.hint{font-size:12px;color:var(--muted);line-height:1.5}
    .row{display:flex;gap:8px;align-items:center}.row.wrap{flex-wrap:wrap}.row.between{justify-content:space-between}.grow{flex:1;min-width:0}
    .smallBtn{min-height:34px;padding:0 10px;font-size:12px}.mainBtn{min-height:40px;padding:0 13px}
    .danger{border-color:rgba(251,113,133,.45);background:rgba(251,113,133,.13)}.good{border-color:rgba(74,222,128,.45);background:rgba(74,222,128,.13)}.gold{border-color:rgba(251,191,36,.48);background:rgba(251,191,36,.14)}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .statGrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.stat{min-height:54px;padding:8px;border:1px solid rgba(255,255,255,.1);border-radius:8px;background:rgba(255,255,255,.045)}.stat b{display:block;font-size:16px}.stat span{font-size:11px;color:var(--muted)}
    .list{display:grid;gap:8px}.card{padding:10px;border:1px solid rgba(255,255,255,.1);border-radius:8px;background:rgba(255,255,255,.045)}.card h4{margin:0 0 6px;font-size:13px}.card p{margin:0;color:var(--muted);font-size:12px;line-height:1.45}
    .quality{font-size:11px;color:#111827;border-radius:6px;padding:2px 6px;background:#e5e7eb;font-weight:950}.q优秀{background:#93c5fd}.q稀有{background:#86efac}.q史诗{background:#c4b5fd}.q传说{background:#facc15}.q破烂但有故事{background:#fda4af}
    .messages{height:calc(100vh - 180px);min-height:220px;overflow:auto;padding-right:4px}.msg{padding:9px 0;border-bottom:1px solid rgba(255,255,255,.07);line-height:1.45}.msg b{color:var(--cyan)}.msg small{display:block;color:var(--muted);font-size:11px;margin-top:2px}.msg.sys{color:#fde68a}
    .chatForm{display:flex;gap:8px;padding-top:10px}.chatForm input{flex:1;min-width:0;min-height:40px;padding:0 10px}.chatForm button{min-width:68px}
    .quick{position:fixed;left:12px;bottom:12px;z-index:4;display:flex;gap:8px;flex-wrap:wrap;max-width:calc(100vw - 450px)}
    .quick button{min-height:42px;padding:0 12px;background:rgba(8,13,23,.76);backdrop-filter:blur(12px);box-shadow:0 12px 32px rgba(0,0,0,.23)}
    .zoneChip{position:fixed;left:12px;bottom:68px;z-index:3;max-width:360px;padding:10px 12px;border:1px solid var(--line);border-radius:8px;background:rgba(8,13,23,.68);backdrop-filter:blur(12px);font-weight:950}.zoneChip span{display:block;margin-top:4px;font-size:12px;color:var(--muted);font-weight:700}
    .toggle{position:fixed;right:12px;bottom:12px;z-index:8;display:none;min-height:42px;padding:0 13px}

    .join{position:fixed;inset:0;z-index:20;display:grid;place-items:center;padding:20px;background:linear-gradient(145deg,rgba(3,7,18,.9),rgba(13,24,38,.88));backdrop-filter:blur(8px)}
    .joinPanel{width:min(850px,100%);display:grid;grid-template-columns:1.1fr .9fr;gap:18px;border:1px solid var(--line);border-radius:8px;background:rgba(8,13,23,.84);box-shadow:0 32px 90px rgba(0,0,0,.44);padding:clamp(20px,4vw,34px)}
    .join h1{margin:0;font-size:clamp(36px,7vw,74px);line-height:.96}.join p{color:var(--muted);line-height:1.7}.tag{margin:0 0 10px;color:var(--green);font-weight:950;letter-spacing:.08em}
    .joinFields{display:grid;gap:12px}.field label{display:block;margin:0 0 7px;color:#cbd5e1;font-weight:850}.field input,.field select{width:100%;min-height:44px;padding:0 12px}
    .colors{display:flex;flex-wrap:wrap;gap:9px}.sw{width:32px;height:32px;border-radius:8px;border:2px solid rgba(255,255,255,.25);cursor:pointer}.sw.active{outline:3px solid rgba(255,255,255,.8);outline-offset:2px}
    .preview{min-height:178px;display:grid;place-items:center;border:1px solid var(--line);border-radius:8px;background:linear-gradient(135deg,rgba(255,255,255,.07),rgba(255,255,255,.025))}
    .avatar{width:86px;height:116px;position:relative}.avatar .head{position:absolute;top:0;left:18px;width:50px;height:50px;border-radius:50%;background:var(--avatar,#38bdf8);box-shadow:inset 0 -8px 0 rgba(0,0,0,.18)}.avatar .body{position:absolute;top:44px;left:10px;width:66px;height:64px;border-radius:18px 18px 8px 8px;background:var(--avatar,#38bdf8);filter:brightness(.92)}.avatar:after{content:"";position:absolute;top:15px;left:33px;width:8px;height:8px;border-radius:50%;background:#071018;box-shadow:15px 0 #071018}
    .start{width:100%;min-height:50px;font-size:18px;border-color:rgba(74,222,128,.5);background:linear-gradient(135deg,rgba(74,222,128,.22),rgba(56,189,248,.15))}
    .hide{display:none!important}
    .mobilePad{position:fixed;left:16px;bottom:88px;z-index:7;width:132px;height:132px;display:none;grid-template-columns:repeat(3,44px);grid-template-rows:repeat(3,44px);opacity:.85}
    .mobilePad button{border-radius:8px;background:rgba(8,13,23,.72);backdrop-filter:blur(8px);padding:0}.mobilePad .blank{visibility:hidden}
    @media(max-width:900px){
      .hud{right:12px}.pill:nth-child(4),.pill:nth-child(5){display:none}
      .panelRight{top:auto;height:min(64vh,620px)}.panelRight.collapsed{display:none}.toggle{display:inline-flex}
      .quick{right:12px;max-width:none;bottom:62px}.quick button{min-height:38px;padding:0 10px;font-size:12px}
      .zoneChip{bottom:112px}.joinPanel{grid-template-columns:1fr}.preview{min-height:130px}.messages{height:32vh}
      .mobilePad{display:grid}.quick{left:160px}
    }
    @media(max-width:560px){
      .statGrid,.grid3{grid-template-columns:1fr 1fr}.grid2{grid-template-columns:1fr}.tabs{grid-template-columns:repeat(5,1fr)}.tab{font-size:12px}
      .quick{left:12px;bottom:58px}.quick button:nth-child(n+5){display:none}.mobilePad{display:none}.zoneChip{display:none}
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div class="hud">
    <div class="pill"><span class="dot"></span><span id="online">在线 0</span></div>
    <div class="pill" id="meLabel">未进入</div>
    <div class="pill">HP <span class="bar hp"><i id="hpBar"></i></span></div>
    <div class="pill">EXP <span class="bar xp"><i id="xpBar"></i></span></div>
    <div class="pill">修为 <span class="bar cult"><i id="cultBar"></i></span></div>
    <div class="pill" id="eventLabel">世界事件加载中</div>
  </div>
  <div class="toast" id="toast"></div>
  <div class="zoneChip" id="zoneChip">城郊小路<span>右键移动 · 左键点怪物攻击 · 危险区可刷怪掉装</span></div>

  <div class="quick" id="quickActions">
    <button data-act="fish">钓鱼</button>
    <button data-act="work">打工</button>
    <button data-act="trash">捡垃圾</button>
    <button data-act="train">修炼</button>
    <button data-act="hunt" class="danger">打怪</button>
    <button data-act="romance" class="gold">恋爱</button>
    <button data-act="attack" class="danger">PK</button>
    <button data-act="sleep">睡桥洞</button>
  </div>

  <div class="mobilePad" id="mobilePad">
    <button class="blank"></button><button data-key="w">↑</button><button class="blank"></button>
    <button data-key="a">←</button><button class="blank"></button><button data-key="d">→</button>
    <button class="blank"></button><button data-key="s">↓</button><button class="blank"></button>
  </div>

  <aside class="panelRight" id="panel">
    <div class="tabs">
      <button class="tab active" data-tab="role">角色</button>
      <button class="tab" data-tab="bag">背包</button>
      <button class="tab" data-tab="quest">任务</button>
      <button class="tab" data-tab="social">社交</button>
      <button class="tab" data-tab="chat">聊天</button>
    </div>
    <div class="pane active" id="pane-role"></div>
    <div class="pane" id="pane-bag"></div>
    <div class="pane" id="pane-quest"></div>
    <div class="pane" id="pane-social"></div>
    <div class="pane" id="pane-chat">
      <div class="messages" id="messages"></div>
      <form class="chatForm" id="chatForm"><input id="sayInput" maxlength="80" placeholder="输入聊天、遗言或颜文字..." autocomplete="off"/><button>发送</button></form>
    </div>
  </aside>
  <button class="toggle" id="togglePanel">面板</button>

  <section class="join" id="join">
    <div class="joinPanel">
      <div>
        <p class="tag">GAME LIFE ONLINE</p>
        <h1>修仙打工<br>开放世界</h1>
        <p>打工修仙、刷怪掉装、找美女恋爱生孩子、拉帮结派建部落。从广场出发，该发财发财，该成家成家。</p>
        <div class="statGrid">
          <div class="stat"><b>5</b><span>美女 NPC</span></div>
          <div class="stat"><b>13</b><span>怪物种类</span></div>
          <div class="stat"><b>部落</b><span>组队抱团</span></div>
        </div>
      </div>
      <div class="joinFields">
        <div class="field"><label>玩家名称</label><input id="name" maxlength="14" placeholder="例如：底层剑仙"/></div>
        <div class="field"><label>身份风格</label><select id="style"><option value="wanderer">流浪者</option><option value="warrior">勇者</option><option value="chef">厨师</option><option value="mason">瓦工</option><option value="cleaner">环卫工</option><option value="coder">码农</option><option value="merchant">摆摊商人</option><option value="knight">骑士</option></select></div>
        <div class="field"><label>外貌颜色</label><div class="colors" id="colors"></div></div>
        <div class="preview"><div class="avatar" id="avatar"><i class="head"></i><i class="body"></i></div></div>
        <button class="start" id="start">进入世界</button>
      </div>
    </div>
  </section>

<script>
const $=s=>document.querySelector(s),$$=s=>Array.from(document.querySelectorAll(s));
const canvas=$('#game'),ctx=canvas.getContext('2d'),messages=$('#messages');
const colorHex={red:'#fb7185',blue:'#60a5fa',green:'#4ade80',yellow:'#fbbf24',purple:'#a78bfa',pink:'#f472b6',orange:'#fb923c',white:'#e5e7eb',black:'#475569',cyan:'#38bdf8'};
let selected='cyan',myId=null,me=null,world={w:2600,h:1700,zones:[]},players=[],monsters=[],beauties=[],tribes=[],chat=[],items={},shop=[],quests={},stalls=[],rankings={},eventInfo={},keys={},cam={x:0,y:0},lastPush=0,lastState=0,lastUi=0,lastPanel='',targetId='',targetMonsterId='',targetBeautyId='',lastFrame=performance.now(),localDirtyUntil=0,lastGreetAt=0,lastHuntAt=0;
let obstacles=[],loot=[],ripples=[],monsterSmooth={};
const zoneMeta={square:['新手广场','#36d399','safe'],work:['打工街','#f59e0b','safe'],river:['河边','#38bdf8','safe'],junk:['垃圾场','#94a3b8','danger'],site:['工地','#fb923c','danger'],market:['黑市','#a78bfa','danger'],wild:['野外荒地','#fb7185','danger'],cave:['修炼洞府','#c084fc','safe'],villa:['富婆别墅区','#f472b6','danger'],road:['城郊小路','#64748b','safe']};
const emotes=['挥手','跳舞','躺平','磕头','装死','比心'];
const styleNames={warrior:'勇者',chef:'厨师',mason:'瓦工',cleaner:'环卫工',coder:'码农',wanderer:'流浪者',merchant:'摆摊商人',knight:'骑士'};

function resize(){let dpr=Math.min(devicePixelRatio||1,2);canvas.width=innerWidth*dpr;canvas.height=innerHeight*dpr;ctx.setTransform(dpr,0,0,dpr,0,0)}addEventListener('resize',resize);resize();
function post(url,data){return fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}).then(r=>r.json())}
function esc(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function itemName(id){return items[id]?.name||id}
function itemQuality(id){return items[id]?.quality||'普通'}
function itemType(id){return items[id]?.type||''}
function styleName(s){return styleNames[s]||s||'流浪者'}
function formatTime(ts){return new Date((ts||Date.now()/1000)*1000).toLocaleTimeString('zh-CN',{hour12:false,hour:'2-digit',minute:'2-digit'})}
function toast(text,bad=false){let box=$('#toast'),d=document.createElement('div');d.textContent=text;d.className=bad?'bad':'good';box.appendChild(d);setTimeout(()=>{d.style.opacity='0';d.style.transform='translateY(-8px)'},2300);setTimeout(()=>d.remove(),2800)}
function buildColors(){const box=$('#colors');Object.entries(colorHex).forEach(([k,v])=>{let b=document.createElement('button');b.type='button';b.className='sw'+(k===selected?' active':'');b.style.background=v;b.title=k;b.onclick=()=>{selected=k;$$('.sw').forEach(x=>x.classList.remove('active'));b.classList.add('active');$('#avatar').style.setProperty('--avatar',v)};box.appendChild(b)});$('#avatar').style.setProperty('--avatar',colorHex[selected])}
buildColors();

function makeWorld(){let seed=11;function rnd(){seed=(seed*9301+49297)%233280;return seed/233280}
  obstacles=[];loot=[];ripples=[];
  for(let i=0;i<120;i++){let x=70+rnd()*(world.w-140),y=70+rnd()*(world.h-140);if(inAnyZone(x,y,['square','river','cave']))continue;obstacles.push({type:rnd()>.36?'tree':'rock',x,y,s:18+rnd()*27})}
  const houses=[[340,610,'shop'],[460,760,'shop'],[620,630,'shop'],[850,210,'villa'],[990,250,'villa'],[1150,210,'villa'],[1840,250,'market'],[2030,300,'market'],[1690,1060,'site'],[1870,1170,'site']];
  houses.forEach(([x,y,type])=>obstacles.push({type:'house',x,y,s:type==='villa'?78:62,sub:type}));
  for(let i=0;i<46;i++)loot.push({x:160+rnd()*470,y:140+rnd()*260,r:8+rnd()*8});
  for(let i=0;i<26;i++)ripples.push({x:120+rnd()*900,y:960+rnd()*340,r:10+rnd()*18,a:rnd()*6});
}
function inAnyZone(x,y,ids){return (world.zones||[]).some(z=>ids.includes(z.id)&&x>z.x&&x<z.x+z.w&&y>z.y&&y<z.y+z.h)}

async function join(){let name=$('#name').value.trim()||('玩家'+Math.floor(Math.random()*999));let style=$('#style').value;let res=await post('/join',{name,style,color:selected});if(res.ok){myId=res.id;me=res.player;world=res.world;makeWorld();$('#join').classList.add('hide');$('#meLabel').textContent=`${me.name} · ${me.title}`;await fetchState(true);toast('进入世界：去垃圾场/野外打怪，或先去广场认路')}}
$('#start').onclick=join;$('#name').addEventListener('keydown',e=>{if(e.key==='Enter')join()});

addEventListener('keydown',e=>{if(document.activeElement===$('#sayInput'))return;if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','a','s','d','W','A','S','D'].includes(e.key)){keys[e.key.toLowerCase()]=true;e.preventDefault()}if(e.key==='Enter'){$('#sayInput').focus();e.preventDefault()}if(e.key===' ') {doQuick();e.preventDefault()}});addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false});
$('#mobilePad').addEventListener('pointerdown',e=>{let k=e.target.dataset.key;if(k){keys[k]=true;e.target.setPointerCapture(e.pointerId)}});$('#mobilePad').addEventListener('pointerup',e=>{let k=e.target.dataset.key;if(k)keys[k]=false});$('#mobilePad').addEventListener('pointercancel',()=>{keys={}});
canvas.addEventListener('contextmenu',e=>e.preventDefault());
canvas.addEventListener('pointerdown',e=>{if(!me)return;e.preventDefault();let wx=e.clientX+cam.x,wy=e.clientY+cam.y;if(e.button===2){setMoveTarget(wx,wy);return}handleLeftClick(wx,wy)});
$('#togglePanel').onclick=()=>$('#panel').classList.toggle('collapsed');
$$('.tab').forEach(b=>b.onclick=()=>{$$('.tab').forEach(x=>x.classList.remove('active'));$$('.pane').forEach(x=>x.classList.remove('active'));b.classList.add('active');$(`#pane-${b.dataset.tab}`).classList.add('active');renderPanels(true)});
$('#chatForm').onsubmit=async e=>{e.preventDefault();let text=$('#sayInput').value.trim();if(!text||!myId)return;$('#sayInput').value='';await post('/say',{id:myId,text});await fetchState(true);$('#sayInput').blur()};
$('#quickActions').onclick=e=>{let act=e.target.dataset.act;if(act)doQuick(act)};

async function fetchState(force=false){if(!myId)return;if(!force&&performance.now()-lastState<520)return;lastState=performance.now();try{let r=await fetch('/state?id='+encodeURIComponent(myId),{cache:'no-store'});let s=await r.json();if(s.ok){players=s.players||[];syncMonsters(s.monsters||[]);beauties=s.beauties||s.me?.beauties||beauties;tribes=s.tribes||[];chat=s.chat||[];items=s.items||items;shop=s.shop||shop;quests=s.quests||quests;stalls=s.stalls||[];rankings=s.rankings||{};eventInfo=s.event||{};world=s.world||world;if(s.me){let local={x:me?.x,y:me?.y,dir:me?.dir,target:me?.target};me={...me,...s.me};if(s.me.beauties)beauties=s.me.beauties;if(performance.now()<localDirtyUntil&&local.x!=null){me.x=local.x;me.y=local.y;me.dir=local.dir;me.target=local.target}}$('#online').textContent='在线 '+players.length+' · 怪 '+(monsters.length||0)+' · 部落 '+(tribes.length||0);renderChat();renderPanels();updateHud()}}catch(e){}}
function syncMonsters(list){const seen=new Set();list.forEach(m=>{seen.add(m.id);let s=monsterSmooth[m.id];if(!s){monsterSmooth[m.id]={x:m.x,y:m.y}}else{s.tx=m.x;s.ty=m.y;if(s.tx==null){s.x=m.x;s.y=m.y}}monsterSmooth[m.id].tx=m.x;monsterSmooth[m.id].ty=m.y;monsterSmooth[m.id].data=m});Object.keys(monsterSmooth).forEach(id=>{if(!seen.has(id))delete monsterSmooth[id]});monsters=list}
function updateHud(){if(!me)return;$('#meLabel').textContent=`Lv.${me.level} ${me.name} · ${me.title}${me.red?' · 红名':''}`;let max=me.stats?.hp||me.maxHp||100;$('#hpBar').style.width=Math.max(0,Math.min(100,me.hp/max*100))+'%';let xpNeed=90+(me.level||1)*55;$('#xpBar').style.width=Math.max(0,Math.min(100,(me.exp||0)/xpNeed*100))+'%';let nextCult=nextRealmNeed(me.cultivation||0);$('#cultBar').style.width=Math.max(0,Math.min(100,(me.cultivation||0)/nextCult*100))+'%';let ev=eventInfo?.name?`${eventInfo.name} ${Math.max(0,Math.ceil((eventInfo.endsAt-Date.now()/1000)||0))}s`:'世界平静';$('#eventLabel').textContent=ev;let z=me.zone||zoneAt(me.x,me.y);let nearM=monsters.filter(m=>Math.hypot(m.x-me.x,m.y-me.y)<220).length;$('#zoneChip').innerHTML=`${z.name}${z.safe?' · 安全区':' · 可战斗'}<span>${zoneHint(z)}${nearM?` · 附近怪物 ${nearM}`:''}${eventInfo?.text?' · '+eventInfo.text:''}</span>`}
function nextRealmNeed(v){let needs=[120,360,820,1500,2600,4200];return needs.find(n=>v<n)||4200}
function zoneAt(x,y){for(let z of world.zones||[]){if(x>=z.x&&x<=z.x+z.w&&y>=z.y&&y<=z.y+z.h)return z}return {id:'road',name:'城郊小路',safe:true,kind:'road'}}
function zoneHint(z){return {social:'聊天交友、组队，女剑仙苏清清在此',work:'打工挣钱，打久了会腰疼',fish:'钓鱼，钓系美女夏浅浅在此',trash:'捡垃圾，也有毒蘑菇和史莱姆',shop:'买礼物装备，夜未央在黑市',pvp:'刷怪、PK、挑战世界 Boss 的主战场',train:'挂机涨修为，女修沐瑶在此',villa:'跑腿+大小姐林晚晚恋爱线'}[z.kind]||'移动、聊天也会获得经验'}

async function action(type,payload={}){if(!myId)return;let res=await post('/action',{id:myId,type,payload});if(res.message)toast(res.message,!res.ok);if(res.me)me={...me,...smeMerge(res.me)};await fetchState(true);return res}
function smeMerge(serverMe){if(!serverMe)return me;let local={x:me?.x,y:me?.y,dir:me?.dir,target:me?.target};let next={...me,...serverMe};if(performance.now()<localDirtyUntil&&local.x!=null){next.x=local.x;next.y=local.y;next.dir=local.dir;next.target=local.target}return next}
function nearestEnemy(){if(!me)return null;let list=players.filter(p=>p.id!==myId&&p.hp>0);list.sort((a,b)=>(a.x-me.x)**2+(a.y-me.y)**2-((b.x-me.x)**2+(b.y-me.y)**2));return list[0]}
function nearestMonster(range=160){if(!me)return null;let list=monsters.filter(m=>m.hp>0).map(m=>({...m,d:Math.hypot(m.x-me.x,m.y-me.y)})).filter(m=>m.d<=range);list.sort((a,b)=>a.d-b.d);return list[0]||null}
function doQuick(act){let z=me?.zone||zoneAt(me?.x||0,me?.y||0);act=act||({fish:'fish',work:'work',trash:'trash',train:'emote',pvp:'hunt',shop:'buy',villa:'romance',social:'romance'}[z.kind]||'emote');if(act==='train')return toast(z.kind==='train'?'站在洞府内会自动涨修为':'去修炼洞府挂机涨修为');if(act==='hunt')return huntNearest();if(act==='romance')return romanceNearest('greet');if(act==='attack'){let n=nearestEnemy();if(n){targetId=n.id;targetMonsterId='';return action('attack',{targetId:n.id})}return huntNearest()}if(act==='work')return action('work',{job:z.id==='site'?'brick':'chef'});if(act==='fish')return action('fish');if(act==='trash')return action('trash');if(act==='sleep')return action('sleep');return action('emote',{text:'挥手'})}
function nearestBeauty(range=220){if(!me)return null;let list=(beauties||[]).map(b=>({...b,d:Math.hypot(b.x-me.x,b.y-me.y)})).filter(b=>b.d<=range);list.sort((a,b)=>a.d-b.d);return list[0]||null}
function romanceNearest(mode='greet'){let b=targetBeautyId?beauties.find(x=>x.id===targetBeautyId):null;if(!b)b=nearestBeauty(260);if(!b)return toast('附近没有美女。去广场/河边/别墅/黑市/洞府找她们',true);targetBeautyId=b.id;let d=Math.hypot(b.x-me.x,b.y-me.y);if(d>130){setMoveTarget(b.x,b.y);toast('正在接近 '+b.name+' · '+b.title);return}return action('romance',{beautyId:b.id,mode})}
function beautyAt(x,y){let list=(beauties||[]).map(b=>({...b,d:Math.hypot(b.x-x,b.y-y)})).filter(b=>b.d<52);list.sort((a,b)=>a.d-b.d);return list[0]}
function huntNearest(){if(!me)return;let z=zoneAt(me.x,me.y);if(z.safe)return toast('安全区不能打怪，去垃圾场/工地/黑市/野外/别墅区',true);let m=nearestMonster(220);if(!m)return toast('附近没有怪物，去危险区逛逛',true);targetMonsterId=m.id;targetId='';if(m.d>95){setMoveTarget(m.x,m.y);toast('已锁定 '+m.name+'，靠近后继续点「打怪」');return}if(performance.now()-lastHuntAt<700)return;lastHuntAt=performance.now();return action('attack',{monsterId:m.id})}
function setMoveTarget(x,y){me.target={x:Math.max(24,Math.min(world.w-24,x)),y:Math.max(24,Math.min(world.h-24,y))};localDirtyUntil=performance.now()+1100}
function playerAt(x,y){let list=players.filter(p=>p.id!==myId&&p.hp>0).map(p=>({...p,d:Math.hypot(p.x-x,p.y-y)})).filter(p=>p.d<58);list.sort((a,b)=>a.d-b.d);return list[0]}
function monsterAt(x,y){let list=monsters.filter(m=>m.hp>0).map(m=>({...m,d:Math.hypot(m.x-x,m.y-y)})).filter(m=>m.d<56);list.sort((a,b)=>a.d-b.d);return list[0]}
async function handleLeftClick(wx,wy){let b=beautyAt(wx,wy);if(b){targetBeautyId=b.id;targetMonsterId='';targetId='';let near=Math.hypot(b.x-me.x,b.y-me.y)<130;if(!near){setMoveTarget(b.x,b.y);toast('锁定 '+b.name+'，靠近后可恋爱互动');return}await action('romance',{beautyId:b.id,mode:'greet'});return}let m=monsterAt(wx,wy);if(m){targetMonsterId=m.id;targetId='';let near=Math.hypot(m.x-me.x,m.y-me.y)<100;if(!near){setMoveTarget(m.x,m.y);toast('锁定怪物 '+m.name+(m.elite?' ★精英':'')+'，靠近后攻击');return}if(performance.now()-lastHuntAt<650)return;lastHuntAt=performance.now();await action('attack',{monsterId:m.id});return}let p=playerAt(wx,wy);if(p){targetId=p.id;targetMonsterId='';let near=Math.hypot(p.x-me.x,p.y-me.y)<130;if(!near){setMoveTarget(p.x,p.y+34);toast('已锁定 '+p.name+'，靠近后再互动');return}if(performance.now()-lastGreetAt<1200)return;lastGreetAt=performance.now();me.bubble='挥手';me.bubbleAt=Date.now()/1000;await action('emote',{text:'挥手'});await post('/say',{id:myId,text:'你好呀，'+p.name+'！'});await fetchState(true);return}doQuick()}

function renderChat(){let key=chat.map(m=>(m.t||0)+m.text).join('|');if(messages.dataset.key===key)return;messages.dataset.key=key;messages.innerHTML='';chat.slice(-70).forEach(m=>{let div=document.createElement('div');div.className='msg '+(m.sys?'sys':'');div.innerHTML=m.sys?`<b>${esc(m.name)}</b>：${esc(m.text)}<small>${formatTime(m.t)}</small>`:`<b>${esc(m.name)}</b> <small>${styleName(m.style)} · ${formatTime(m.t)}</small>${esc(m.text)}`;messages.appendChild(div)});messages.scrollTop=messages.scrollHeight}

function renderPanels(force=false){if(!me)return;let active=$('.tab.active')?.dataset.tab||'role';let key=active+JSON.stringify({me,stalls,players,rankings,eventInfo,tribes,beauties:beauties.map(b=>b.id+':'+(b.affection||0)),mk:monsters.map(m=>m.id+m.hp).join('|')});if(!force&&key===lastPanel&&performance.now()-lastUi<900)return;lastPanel=key;lastUi=performance.now();if(active==='role')renderRole();if(active==='bag')renderBag();if(active==='quest')renderQuest();if(active==='social')renderSocial()}
function renderRole(){let s=me.stats||{};let z=me.zone||zoneAt(me.x,me.y);let kids=(me.children||[]).map(c=>`${esc(c.name)}(${esc(c.trait)})`).join('、')||'暂无';$('#pane-role').innerHTML=`
  <div class="section"><div class="row between"><div><h3>${esc(me.name)} · ${esc(me.realm)}</h3><div class="hint">称号：${esc(me.title)}${me.tribe||me.guild?' · 部落：'+esc(me.tribe||me.guild):''}${me.partnerName?' · 伴侣：'+esc(me.partnerName):''}${me.pet?' · 宠物：'+esc(me.pet):''}</div></div><button class="smallBtn gold" data-role="potion">喝药</button></div></div>
  <div class="section"><h3>家庭</h3><div class="hint">伴侣 ${esc(me.partnerName||'无')} · 孩子 ${me.children?.length||0}/3<br>${kids}</div></div>
  <div class="section"><div class="statGrid">${stat('等级',me.level)}${stat('金币',me.gold)}${stat('银行',me.bank)}${stat('生命',`${me.hp}/${s.hp}`)}${stat('攻击',s.attack)}${stat('防御',s.defense)}${stat('速度',s.speed)}${stat('暴击',s.crit+'%')}${stat('幸运',s.luck)}</div></div>
  <div class="section"><h3>当前区域</h3><div class="card"><h4>${esc(z.name)} ${z.safe?'安全区':'野外区'}</h4><p>${zoneHint(z)}</p></div></div>
  <div class="section"><h3>装备</h3><div class="list">${Object.entries(me.equipment||{}).map(([slot,id])=>`<div class="card"><div class="row between"><b>${slotName(slot)}</b><span>${esc(itemName(id))}</span></div><p>${esc(itemQuality(id))}</p></div>`).join('')||'<div class="hint">还没有装备</div>'}</div></div>
  <div class="section"><h3>银行</h3><div class="row"><input class="grow" id="bankAmount" type="number" min="1" value="100"><button class="smallBtn" data-role="deposit">存</button><button class="smallBtn" data-role="withdraw">取</button></div></div>
  <div class="section"><h3>称号</h3><div class="row wrap">${(me.titles||[]).map(t=>`<button class="smallBtn ${t===me.title?'good':''}" data-title="${esc(t)}">${esc(t)}</button>`).join('')}</div></div>
  <div class="section"><h3>表情动作</h3><div class="grid3">${emotes.map(e=>`<button class="smallBtn" data-emote="${e}">${e}</button>`).join('')}</div></div>`;
  $('#pane-role').onclick=e=>{let a=e.target.dataset.role;if(a==='potion')action('use',{itemId:'potion'});if(a==='deposit'||a==='withdraw')action('bank',{mode:a,amount:+$('#bankAmount').value||1});let title=e.target.dataset.title;if(title)action('title',{title});let em=e.target.dataset.emote;if(em)action('emote',{text:em})};
}
function stat(k,v){return `<div class="stat"><b>${esc(v)}</b><span>${k}</span></div>`}
function slotName(s){return {weapon:'武器',armor:'防具',accessory:'饰品'}[s]||s}
function renderBag(){let inv=Object.entries(me.inventory||{}).filter(([,q])=>q>0);$('#pane-bag').innerHTML=`
  <div class="section"><h3>背包</h3><div class="list">${inv.map(([id,q])=>itemCard(id,q)).join('')||'<div class="hint">背包空空，去打工或捡垃圾。</div>'}</div></div>
  <div class="section"><h3>商店</h3><div class="list">${shop.map(id=>shopCard(id)).join('')}</div></div>
  <div class="section"><h3>摆摊</h3><div class="row"><select class="grow" id="stallItem">${inv.map(([id,q])=>`<option value="${id}">${esc(itemName(id))} x${q}</option>`).join('')}</select><input id="stallPrice" type="number" min="1" value="99" style="width:82px"><button class="smallBtn" data-bag="stall">挂卖</button></div><div class="list" style="margin-top:8px">${stalls.map(stallCard).join('')||'<div class="hint">暂时没人摆摊。</div>'}</div></div>`;
  $('#pane-bag').onclick=e=>{let id=e.target.dataset.buy;if(id)action('buy',{itemId:id,qty:1});id=e.target.dataset.sell;if(id)action('sell',{itemId:id,qty:1});id=e.target.dataset.equip;if(id)action('equip',{itemId:id});let sid=e.target.dataset.stallbuy;if(sid)action('stall_buy',{stallId:sid});sid=e.target.dataset.cancel;if(sid)action('stall_cancel',{stallId:sid});if(e.target.dataset.bag==='stall')action('stall_create',{itemId:$('#stallItem').value,qty:1,price:+$('#stallPrice').value||1})};
}
function itemCard(id,q){let it=items[id]||{};let canEquip=['weapon','armor','accessory','mount','pet'].includes(it.type);return `<div class="card"><div class="row between"><h4>${esc(it.name||id)} x${q}</h4><span class="quality q${esc(it.quality||'普通')}">${esc(it.quality||'普通')}</span></div><p>${esc(it.type||'物品')} · 参考价 ${it.price||0}</p><div class="row" style="margin-top:8px">${canEquip?`<button class="smallBtn good" data-equip="${id}">${it.type==='pet'?'孵化':'装备'}</button>`:''}<button class="smallBtn" data-sell="${id}">卖出</button></div></div>`}
function shopCard(id){let it=items[id]||{};return `<div class="card"><div class="row between"><h4>${esc(it.name||id)}</h4><span>${it.price||0} 金币</span></div><p><span class="quality q${esc(it.quality||'普通')}">${esc(it.quality||'普通')}</span> ${esc(it.type||'物品')}</p><button class="smallBtn gold" data-buy="${id}" style="margin-top:8px">购买</button></div>`}
function stallCard(s){return `<div class="card"><div class="row between"><h4>${esc(itemName(s.itemId))} x${s.qty}</h4><span>${s.price} 金币</span></div><p>摊主：${esc(s.seller)}</p><div class="row" style="margin-top:8px">${s.sellerId===myId?`<button class="smallBtn" data-cancel="${s.id}">收摊</button>`:`<button class="smallBtn good" data-stallbuy="${s.id}">买下</button>`}</div></div>`}
function renderQuest(){let qHtml=Object.entries(quests).map(([id,q])=>{let [key,need]=q.need||['',1],cur=me.counters?.[key]||0,done=cur>=need,claimed=(me.claimed||[]).includes(id);return `<div class="card"><div class="row between"><h4>${esc(q.name)}</h4><span>${Math.min(cur,need)}/${need}</span></div><p>${esc(q.desc)} · 奖励 ${q.gold} 金币 / ${q.exp} 经验</p><button class="smallBtn ${done&&!claimed?'good':''}" data-claim="${id}" ${!done||claimed?'disabled':''}>${claimed?'已领取':'领奖'}</button></div>`}).join('');
  let boards=Object.entries(rankings).map(([name,rows])=>`<div class="card"><h4>${esc(name)}</h4><p>${(rows||[]).map((r,i)=>`${i+1}. ${esc(r.name)} ${r.value}`).join('<br>')||'暂无数据'}</p></div>`).join('');
  $('#pane-quest').innerHTML=`<div class="section"><h3>任务</h3><div class="list">${qHtml}</div></div><div class="section"><h3>排行榜</h3><div class="list">${boards}</div></div>`;
  $('#pane-quest').onclick=e=>{let id=e.target.dataset.claim;if(id)action('claim',{questId:id})};
}
function renderSocial(){let others=players.filter(p=>p.id!==myId);let nearMon=monsters.filter(m=>Math.hypot(m.x-me.x,m.y-me.y)<360).sort((a,b)=>Math.hypot(a.x-me.x,a.y-me.y)-Math.hypot(b.x-me.x,b.y-me.y)).slice(0,6);let bList=(beauties||[]).slice().sort((a,b)=>(b.affection||0)-(a.affection||0));let myTribe=me.tribeInfo||tribes.find(t=>t.id===me.tribeId);$('#pane-social').innerHTML=`
  <div class="section"><h3>恋爱 · 美女任务</h3><div class="hint">流程：搭讪 → 送礼 → 约会(好感≥25) → 告白(≥70) → 生孩子。礼物在商店买。</div><div class="list" style="margin-top:8px">${bList.map(b=>`<div class="card"><div class="row between"><h4>${esc(b.name)}</h4><span>${b.affection||0}/100</span></div><p>${esc(b.title)} · 最爱 ${esc(b.preferName||b.prefer)} · ${esc(zoneMeta[b.zone]?.[0]||b.zone)}${me.partnerId===b.id?' · ♥伴侣':''}</p><p style="margin-top:4px">${esc(b.line||'')}</p><div class="row wrap" style="margin-top:8px"><button class="smallBtn" data-bgo="${b.id}">前往</button><button class="smallBtn" data-brom='${b.id}|greet'>搭讪</button><button class="smallBtn gold" data-brom='${b.id}|gift'>送礼</button><button class="smallBtn" data-brom='${b.id}|date'>约会</button><button class="smallBtn good" data-brom='${b.id}|confess'>告白</button><button class="smallBtn gold" data-brom='${b.id}|baby'>生孩子</button></div></div>`).join('')}</div></div>
  <div class="section"><h3>部落系统</h3>
    ${myTribe?`<div class="card"><h4>${esc(myTribe.name)} · Lv.${myTribe.level||1}</h4><p>酋长 ${esc(myTribe.leaderName||'')} · 成员 ${myTribe.memberCount||0}/20 · 金库 ${myTribe.fund||0}</p><p>公告：${esc(myTribe.notice||'无')}</p><p>${(myTribe.members||[]).map(m=>esc(m.name)+(m.role==='leader'?'★':'')).join('、')}</p>
      <div class="row wrap" style="margin-top:8px"><input id="donateAmt" type="number" min="10" value="50" style="width:72px"><button class="smallBtn gold" data-tribe="donate">捐献</button><button class="smallBtn" data-tribe="leave">退出</button>${me.tribeRole==='leader'?`<input class="grow" id="tribeNotice" maxlength="40" placeholder="部落公告"><button class="smallBtn" data-tribe="notice">改公告</button>`:''}</div></div>`
    :`<div class="row" style="margin-bottom:8px"><input class="grow" id="newTribe" maxlength="12" placeholder="创建部落名"><button class="smallBtn good" data-tribe="create">创建(100金)</button></div>
      <div class="list">${(tribes||[]).map(t=>`<div class="card"><div class="row between"><h4>${esc(t.name)} Lv.${t.level||1}</h4><span>${t.memberCount||0}人</span></div><p>酋长 ${esc(t.leaderName||'')} · ${esc(t.notice||'')}</p><button class="smallBtn" data-tjoin="${t.id}" style="margin-top:8px">加入</button></div>`).join('')||'<div class="hint">还没有部落，来当第一个酋长吧。</div>'}</div>`}
  </div>

  else if(shape==='skeleton'){ctx.fillStyle=col;roundRect(x-10,y-6,20,28,4);ctx.fill();ctx.beginPath();ctx.arc(x,y-18,12,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#0f172a';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x-5,y-18);ctx.lineTo(x-5,y-14);ctx.moveTo(x+5,y-18);ctx.lineTo(x+5,y-14);ctx.moveTo(x-4,y-10);ctx.lineTo(x+4,y-10);ctx.stroke();ctx.fillStyle='#94a3b8';roundRect(x+10,y-4,16,5,2);ctx.fill()}

  else if(shape==='troll'){ctx.fillStyle=col;roundRect(x-18,y-10,36,40,10);ctx.fill();ctx.beginPath();ctx.arc(x,y-22,16,0,Math.PI*2);ctx.fill();ctx.fillStyle=shade(col,-25);roundRect(x-22,y+4,12,22,4);ctx.fill();roundRect(x+10,y+4,12,22,4);ctx.fill();ctx.fillStyle='#0f172a';ctx.beginPath();ctx.arc(x-6,y-24,2.4,0,Math.PI*2);ctx.arc(x+6,y-24,2.4,0,Math.PI*2);ctx.fill()}
  else if(shape==='mech'){ctx.fillStyle=col;roundRect(x-18,y-8,36,34,6);ctx.fill();ctx.fillStyle=shade(col,-30);roundRect(x-14,y-24,28,18,4);ctx.fill();ctx.fillStyle='#38bdf8';ctx.fillRect(x-8,y-18,16,6);ctx.fillStyle='#64748b';roundRect(x-20,y+18,14,10,3);ctx.fill();roundRect(x+6,y+18,14,10,3);ctx.fill()}
  else if(shape==='mushroom'){ctx.fillStyle='#f8fafc';roundRect(x-7,y-2,14,24,4);ctx.fill();ctx.fillStyle=col;ctx.beginPath();ctx.ellipse(x,y-10,22,14,0,Math.PI,0);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x-8,y-12,3,0,Math.PI*2);ctx.arc(x+6,y-8,2.5,0,Math.PI*2);ctx.fill()}
  else if(shape==='lancer'){ctx.fillStyle=col;roundRect(x-12,y-4,24,32,8);ctx.fill();ctx.beginPath();ctx.arc(x,y-18,13,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#e2e8f0';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(x+14,y+18);ctx.lineTo(x+14,y-40);ctx.stroke();ctx.fillStyle='#f8fafc';ctx.beginPath();ctx.moveTo(x+14,y-44);ctx.lineTo(x+8,y-34);ctx.lineTo(x+20,y-34);ctx.closePath();ctx.fill()}
  else if(shape==='thief'){ctx.fillStyle=col;roundRect(x-11,y-2,22,30,8);ctx.fill();ctx.beginPath();ctx.arc(x,y-16,12,0,Math.PI*2);ctx.fill();ctx.fillStyle='#0f172a';roundRect(x-12,y-20,24,8,3);ctx.fill();ctx.fillStyle='#fbbf24';ctx.fillRect(x+10,y+4,8,10)}
  else if(shape==='guard'){ctx.fillStyle=col;roundRect(x-16,y-6,32,36,8);ctx.fill();ctx.fillStyle=shade(col,-20);roundRect(x-18,y-28,36,18,4);ctx.fill();ctx.fillStyle='#fde68a';ctx.fillRect(x-6,y-22,12,6);ctx.strokeStyle='#cbd5e1';ctx.lineWidth=4;ctx.beginPath();ctx.arc(x-20,y+4,12,0,Math.PI*2);ctx.stroke()}
  else if(shape==='angel'){ctx.fillStyle='rgba(255,255,255,.35)';ctx.beginPath();ctx.ellipse(x-18,y-8,14,8,-.4,0,Math.PI*2);ctx.ellipse(x+18,y-8,14,8,.4,0,Math.PI*2);ctx.fill();ctx.fillStyle=col;roundRect(x-11,y-2,22,30,10);ctx.fill();ctx.beginPath();ctx.arc(x,y-18,12,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#fde68a';ctx.lineWidth=2;ctx.beginPath();ctx.arc(x,y-30,8,0,Math.PI*2);ctx.stroke()}
  else if(shape==='dragon'){ctx.fillStyle=col;ctx.beginPath();ctx.ellipse(x,y+2,26,14,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+18,y-10,14,0,Math.PI*2);ctx.fill();ctx.fillStyle=shade(col,-30);ctx.beginPath();ctx.moveTo(x+12,y-20);ctx.lineTo(x+18,y-34);ctx.lineTo(x+26,y-18);ctx.closePath();ctx.fill();ctx.fillStyle='#ef4444';ctx.beginPath();ctx.moveTo(x+28,y-6);ctx.lineTo(x+40,y-2);ctx.lineTo(x+28,y+2);ctx.closePath();ctx.fill()}
  else{// goblin default
    ctx.fillStyle=col;roundRect(x-12,y-2,24,28,8);ctx.fill();ctx.beginPath();ctx.arc(x,y-16,13,0,Math.PI*2);ctx.fill();ctx.fillStyle=shade(col,-20);ctx.beginPath();ctx.moveTo(x-12,y-18);ctx.lineTo(x-20,y-28);ctx.lineTo(x-6,y-22);ctx.closePath();ctx.moveTo(x+12,y-18);ctx.lineTo(x+20,y-28);ctx.lineTo(x+6,y-22);ctx.closePath();ctx.fill();ctx.fillStyle='#0f172a';ctx.beginPath();ctx.arc(x-5,y-17,2.2,0,Math.PI*2);ctx.arc(x+5,y-17,2.2,0,Math.PI*2);ctx.fill()}
  ctx.restore()}
function drawMini(){let w=164,h=108,x=12,y=58;ctx.save();ctx.fillStyle='rgba(8,13,23,.7)';ctx.strokeStyle='rgba(255,255,255,.16)';roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();(world.zones||[]).forEach(z=>{let meta=zoneMeta[z.id]||zoneMeta.road;ctx.fillStyle=hexA(meta[1],.35);ctx.fillRect(x+z.x/world.w*w,y+z.y/world.h*h,z.w/world.w*w,z.h/world.h*h)});monsters.forEach(m=>{ctx.fillStyle=m.elite?'#fbbf24':'#fb7185';ctx.beginPath();ctx.arc(x+m.x/world.w*w,y+m.y/world.h*h,m.elite?2.6:1.8,0,Math.PI*2);ctx.fill()});(beauties||[]).forEach(b=>{ctx.fillStyle='#f472b6';ctx.beginPath();ctx.arc(x+b.x/world.w*w,y+b.y/world.h*h,2.8,0,Math.PI*2);ctx.fill()});players.forEach(p=>{ctx.fillStyle=colorHex[p.color]||'#fff';ctx.beginPath();ctx.arc(x+p.x/world.w*w,y+p.y/world.h*h,p.id===myId?4:3,0,Math.PI*2);ctx.fill()});ctx.restore()}
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}
function shade(hex,p){let n=parseInt(hex.slice(1),16),r=(n>>16)+p,g=((n>>8)&255)+p,b=(n&255)+p;return '#'+[r,g,b].map(v=>Math.max(0,Math.min(255,v)).toString(16).padStart(2,'0')).join('')}
function hexA(hex,a){let n=parseInt(hex.slice(1),16),r=n>>16,g=(n>>8)&255,b=n&255;return `rgba(${r},${g},${b},${a})`}
addEventListener('beforeunload',()=>{if(myId)navigator.sendBeacon('/leave',new Blob([JSON.stringify({id:myId})],{type:'application/json'}))});
