<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>游戏人生 Online | 开放世界聊天室</title>
  <meta name="description" content="一个简单的网页开放世界小游戏：选择昵称和外貌，移动、发言、聊天。" />
  <style>
    :root{color-scheme:dark;--bg:#071018;--ink:#f8fafc;--muted:#a6b1c3;--line:rgba(255,255,255,.14);--panel:rgba(8,13,23,.72);--green:#4ade80;--cyan:#38bdf8;--gold:#fbbf24;--red:#fb7185;--purple:#a78bfa}
    *{box-sizing:border-box}html,body{height:100%;margin:0;overflow:hidden;font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;color:var(--ink);background:#071018}
    body{background:radial-gradient(circle at 15% 16%,rgba(74,222,128,.17),transparent 26rem),radial-gradient(circle at 84% 10%,rgba(56,189,248,.18),transparent 25rem),linear-gradient(145deg,#071018,#0f172a 55%,#111827)}
    #game{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none;cursor:crosshair}
    .hud{position:fixed;left:14px;top:14px;z-index:3;display:flex;gap:10px;align-items:center;flex-wrap:wrap;pointer-events:none}.pill{min-height:36px;display:inline-flex;align-items:center;gap:8px;padding:0 12px;border:1px solid var(--line);border-radius:8px;background:rgba(8,13,23,.65);backdrop-filter:blur(12px);box-shadow:0 10px 30px rgba(0,0,0,.18);font-weight:800}.dot{width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 18px var(--green)}
    .chat{position:fixed;right:14px;top:14px;bottom:14px;width:min(380px,calc(100vw - 28px));z-index:4;display:flex;flex-direction:column;border:1px solid var(--line);border-radius:8px;background:rgba(8,13,23,.74);backdrop-filter:blur(16px);box-shadow:0 24px 70px rgba(0,0,0,.34);overflow:hidden}.chat header{min-height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-bottom:1px solid var(--line);font-weight:950}.chat header span{color:var(--muted);font-size:13px}.messages{flex:1;overflow:auto;padding:12px}.msg{padding:10px 0;border-bottom:1px solid rgba(255,255,255,.07);line-height:1.45}.msg b{color:var(--cyan)}.msg small{display:block;color:var(--muted);font-size:12px;margin-top:3px}.msg.sys{color:var(--gold)}.chat form{display:flex;gap:8px;padding:12px;border-top:1px solid var(--line)}input,button,select{font:inherit}#sayInput{flex:1;min-width:0;border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,.07);color:var(--ink);padding:0 12px;outline:none}#sayInput:focus{border-color:rgba(56,189,248,.65);box-shadow:0 0 0 3px rgba(56,189,248,.12)}button{min-height:40px;border:1px solid rgba(74,222,128,.45);border-radius:8px;background:linear-gradient(135deg,rgba(74,222,128,.22),rgba(56,189,248,.15));color:var(--ink);font-weight:900;padding:0 14px;cursor:pointer}.toggle{position:fixed;right:14px;bottom:14px;z-index:6;display:none}.help{position:fixed;left:14px;bottom:14px;z-index:3;max-width:560px;color:var(--muted);font-size:13px;line-height:1.6;padding:10px 12px;border:1px solid var(--line);border-radius:8px;background:rgba(8,13,23,.62);backdrop-filter:blur(12px)}
    .join{position:fixed;inset:0;z-index:20;display:grid;place-items:center;padding:20px;background:radial-gradient(circle at 20% 20%,rgba(56,189,248,.18),transparent 24rem),radial-gradient(circle at 76% 22%,rgba(74,222,128,.18),transparent 24rem),rgba(3,7,18,.84);backdrop-filter:blur(10px)}.panel{width:min(760px,100%);border:1px solid var(--line);border-radius:8px;background:rgba(8,13,23,.82);box-shadow:0 32px 90px rgba(0,0,0,.44);padding:clamp(22px,4vw,38px)}.panel h1{margin:0;font-size:clamp(38px,7vw,76px);line-height:.95}.panel p{color:var(--muted);line-height:1.7}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:22px}.field label{display:block;margin:0 0 8px;color:#cbd5e1;font-weight:850}.field input,.field select{width:100%;min-height:46px;border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,.07);color:var(--ink);padding:0 12px;outline:none}.colors{display:flex;flex-wrap:wrap;gap:9px}.sw{width:34px;height:34px;border-radius:8px;border:2px solid rgba(255,255,255,.25);cursor:pointer}.sw.active{outline:3px solid rgba(255,255,255,.8);outline-offset:2px}.preview{min-height:180px;display:grid;place-items:center;border:1px solid var(--line);border-radius:8px;background:linear-gradient(135deg,rgba(255,255,255,.06),rgba(255,255,255,.02))}.avatar{width:86px;height:116px;position:relative}.avatar .head{position:absolute;top:0;left:18px;width:50px;height:50px;border-radius:50%;background:var(--avatar,#38bdf8);box-shadow:inset 0 -8px 0 rgba(0,0,0,.18)}.avatar .body{position:absolute;top:44px;left:10px;width:66px;height:64px;border-radius:18px 18px 8px 8px;background:var(--avatar,#38bdf8);filter:brightness(.92)}.avatar:after{content:"";position:absolute;top:15px;left:33px;width:8px;height:8px;border-radius:50%;background:#071018;box-shadow:15px 0 #071018}.start{margin-top:20px;width:100%;min-height:52px;font-size:18px}.hide{display:none!important}
    @media(max-width:760px){.chat{top:auto;height:45vh}.chat.collapsed{display:none}.toggle{display:inline-flex}.help{display:none}.grid{grid-template-columns:1fr}.hud{right:14px}.pill:nth-child(2){display:none}}
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div class="hud"><div class="pill"><span class="dot"></span><span id="online">在线 0</span></div><div class="pill">WASD / 方向键移动 · Enter 聊天</div><div class="pill" id="meLabel">未进入</div></div>
  <aside class="chat" id="chatBox"><header><div>世界频道</div><span id="chatHint">发言会显示在头顶</span></header><div class="messages" id="messages"></div><form id="chatForm"><input id="sayInput" maxlength="80" placeholder="输入一句话..." autocomplete="off"/><button>发送</button></form></aside>
  <button class="toggle" id="toggleChat">聊天</button>
  <div class="help">玩法：选择昵称和外貌后进入开放世界；用 WASD / 方向键移动；在右侧聊天框发言，角色头顶会出现气泡。多开几个浏览器标签可以模拟多人在线。</div>
  <section class="join" id="join"><div class="panel"><p style="margin:0 0 10px;color:var(--green);font-weight:950;letter-spacing:.08em">GAME LIFE ONLINE</p><h1>游戏人生<br>开放世界小镇</h1><p>随便取个名，选个外貌，进入地图。你可以移动、围观、打字发言，发言会飘在角色头顶，同时进入世界聊天频道。</p><div class="grid"><div class="field"><label>玩家名称</label><input id="name" maxlength="14" placeholder="例如：底层勇者"/></div><div class="field"><label>身份风格</label><select id="style"><option value="wanderer">流浪者</option><option value="warrior">勇者</option><option value="chef">厨师</option><option value="mason">瓦工</option><option value="cleaner">环卫工</option><option value="coder">码农</option><option value="merchant">摆摊商人</option><option value="knight">骑士</option></select></div><div class="field"><label>外貌颜色</label><div class="colors" id="colors"></div></div><div class="preview"><div class="avatar" id="avatar"><i class="head"></i><i class="body"></i></div></div></div><button class="start" id="start">进入世界</button></div></section>
<script>
const $=s=>document.querySelector(s);const canvas=$('#game'),ctx=canvas.getContext('2d');const messages=$('#messages');
const colorHex={red:'#fb7185',blue:'#60a5fa',green:'#4ade80',yellow:'#fbbf24',purple:'#a78bfa',pink:'#f472b6',orange:'#fb923c',white:'#e5e7eb',black:'#475569',cyan:'#38bdf8'};let selected='cyan';let myId=null,me=null,world={w:2200,h:1500},players=[],chat=[];let keys={},cam={x:0,y:0};let lastPush=0,lastState=0;let obstacles=[];
function makeWorld(){let seed=7;function rnd(){seed=(seed*9301+49297)%233280;return seed/233280}for(let i=0;i<95;i++){obstacles.push({type:rnd()>.38?'tree':'rock',x:80+rnd()*(world.w-160),y:80+rnd()*(world.h-160),s:18+rnd()*26})}for(let i=0;i<12;i++){obstacles.push({type:'house',x:180+rnd()*(world.w-360),y:160+rnd()*(world.h-320),s:52+rnd()*22})}}
function buildColors(){const box=$('#colors');Object.entries(colorHex).forEach(([k,v])=>{let b=document.createElement('button');b.type='button';b.className='sw'+(k===selected?' active':'');b.style.background=v;b.title=k;b.onclick=()=>{selected=k;document.querySelectorAll('.sw').forEach(x=>x.classList.remove('active'));b.classList.add('active');$('#avatar').style.setProperty('--avatar',v)};box.appendChild(b)});$('#avatar').style.setProperty('--avatar',colorHex[selected])}
async function post(url,data){let r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});return r.json()}
async function join(){let name=$('#name').value.trim()||('玩家'+Math.floor(Math.random()*999));let style=$('#style').value;let res=await post('/join',{name,style,color:selected});if(res.ok){myId=res.id;me=res.player;world=res.world;$('#join').classList.add('hide');$('#meLabel').textContent=me.name+' · '+styleName(me.style);fetchState(true)}}
function styleName(s){return {warrior:'勇者',chef:'厨师',mason:'瓦工',cleaner:'环卫工',coder:'码农',wanderer:'流浪者',merchant:'摆摊商人',knight:'骑士'}[s]||s}
function resize(){let dpr=Math.min(devicePixelRatio||1,2);canvas.width=innerWidth*dpr;canvas.height=innerHeight*dpr;ctx.setTransform(dpr,0,0,dpr,0,0)}addEventListener('resize',resize);resize();buildColors();makeWorld();$('#start').onclick=join;$('#name').addEventListener('keydown',e=>{if(e.key==='Enter')join()});
addEventListener('keydown',e=>{if(document.activeElement===$('#sayInput'))return;if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','a','s','d','W','A','S','D'].includes(e.key)){keys[e.key.toLowerCase()]=true;e.preventDefault()}if(e.key==='Enter'){$('#sayInput').focus();e.preventDefault()}});addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false});
canvas.addEventListener('pointerdown',e=>{if(!me)return;let wx=e.clientX+cam.x,wy=e.clientY+cam.y;me.target={x:wx,y:wy}});
$('#chatForm').onsubmit=async e=>{e.preventDefault();let text=$('#sayInput').value.trim();if(!text||!myId)return;$('#sayInput').value='';await post('/say',{id:myId,text});await fetchState(true);$('#sayInput').blur()};$('#toggleChat').onclick=()=>$('#chatBox').classList.toggle('collapsed');
async function fetchState(force=false){if(!force&&performance.now()-lastState<520)return;lastState=performance.now();try{let r=await fetch('/state',{cache:'no-store'});let s=await r.json();if(s.ok){players=s.players;chat=s.chat;$('#online').textContent='在线 '+players.length;renderChat();let fresh=players.find(p=>p.id===myId);if(fresh&&me){me.bubble=fresh.bubble;me.bubbleAt=fresh.bubbleAt}}}catch(e){}}
function renderChat(){let key=chat.map(m=>(m.t||0)+m.text).join('|');if(messages.dataset.key===key)return;messages.dataset.key=key;messages.innerHTML='';chat.slice(-60).forEach(m=>{let div=document.createElement('div');div.className='msg '+(m.sys?'sys':'');let time=new Date((m.t||Date.now()/1000)*1000).toLocaleTimeString('zh-CN',{hour12:false,hour:'2-digit',minute:'2-digit'});div.innerHTML=m.sys?`<b>${esc(m.name)}</b>：${esc(m.text)}<small>${time}</small>`:`<b>${esc(m.name)}</b> <small>${styleName(m.style||'wanderer')} · ${time}</small>${esc(m.text)}`;messages.appendChild(div)});messages.scrollTop=messages.scrollHeight}
function esc(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function tick(t){if(me){let speed=4.2,dx=0,dy=0;if(keys.w||keys.arrowup)dy-=1;if(keys.s||keys.arrowdown)dy+=1;if(keys.a||keys.arrowleft)dx-=1;if(keys.d||keys.arrowright)dx+=1;if(me.target){let tx=me.target.x-me.x,ty=me.target.y-me.y,dist=Math.hypot(tx,ty);if(dist>6){dx=tx/dist;dy=ty/dist}else me.target=null}if(dx||dy){let n=Math.hypot(dx,dy)||1;me.x=Math.max(24,Math.min(world.w-24,me.x+dx/n*speed));me.y=Math.max(24,Math.min(world.h-24,me.y+dy/n*speed));me.dir=Math.abs(dx)>Math.abs(dy)?(dx>0?'right':'left'):(dy>0?'down':'up')}cam.x=Math.max(0,Math.min(world.w-innerWidth,me.x-innerWidth*.42));cam.y=Math.max(0,Math.min(world.h-innerHeight,me.y-innerHeight*.5));if(performance.now()-lastPush>180){lastPush=performance.now();post('/update',{id:myId,x:me.x,y:me.y,dir:me.dir}).catch(()=>{})}}fetchState();draw();requestAnimationFrame(tick)}requestAnimationFrame(tick);
function draw(){ctx.clearRect(0,0,innerWidth,innerHeight);drawGround();let all=[...obstacles.map(o=>({...o,kind:'obj'})),...players.map(p=>({...p,kind:'player'}))];if(me&&!players.some(p=>p.id===myId))all.push({...me,kind:'player'});all.sort((a,b)=>a.y-b.y).forEach(e=>e.kind==='player'?drawPlayer(e):drawObj(e));drawMini()}
function drawGround(){ctx.save();ctx.translate(-cam.x,-cam.y);let grd=ctx.createLinearGradient(0,0,world.w,world.h);grd.addColorStop(0,'#16331f');grd.addColorStop(.5,'#203a2a');grd.addColorStop(1,'#1d2b38');ctx.fillStyle=grd;ctx.fillRect(0,0,world.w,world.h);ctx.strokeStyle='rgba(255,255,255,.055)';ctx.lineWidth=1;for(let x=0;x<world.w;x+=64){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,world.h);ctx.stroke()}for(let y=0;y<world.h;y+=64){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(world.w,y);ctx.stroke()}ctx.fillStyle='rgba(56,189,248,.22)';roundRect(1460,220,440,250,28);ctx.fill();ctx.fillStyle='rgba(251,191,36,.18)';roundRect(760,600,620,360,24);ctx.fill();ctx.restore()}
function drawObj(o){let x=o.x-cam.x,y=o.y-cam.y;if(x<-100||y<-100||x>innerWidth+100||y>innerHeight+100)return;ctx.save();if(o.type==='tree'){ctx.fillStyle='rgba(0,0,0,.22)';ctx.beginPath();ctx.ellipse(x,y+o.s*.55,o.s*.8,o.s*.28,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#7c4a24';roundRect(x-o.s*.14,y-o.s*.2,o.s*.28,o.s*.75,6);ctx.fill();ctx.fillStyle='#36a852';ctx.beginPath();ctx.arc(x,y-o.s*.25,o.s*.66,0,Math.PI*2);ctx.fill();ctx.fillStyle='#2f8b46';ctx.beginPath();ctx.arc(x-o.s*.3,y,o.s*.5,0,Math.PI*2);ctx.arc(x+o.s*.3,y,o.s*.48,0,Math.PI*2);ctx.fill()}else if(o.type==='house'){ctx.fillStyle='rgba(0,0,0,.22)';roundRect(x-o.s*.55,y-o.s*.05,o.s*1.1,o.s*.75,10);ctx.fill();ctx.fillStyle='#8b5a2b';roundRect(x-o.s*.46,y-o.s*.28,o.s*.92,o.s*.7,8);ctx.fill();ctx.fillStyle='#b91c1c';ctx.beginPath();ctx.moveTo(x-o.s*.56,y-o.s*.28);ctx.lineTo(x,y-o.s*.82);ctx.lineTo(x+o.s*.56,y-o.s*.28);ctx.closePath();ctx.fill();ctx.fillStyle='#2b1b10';roundRect(x-o.s*.1,y,o.s*.2,o.s*.42,4);ctx.fill()}else{ctx.fillStyle='rgba(0,0,0,.22)';ctx.beginPath();ctx.ellipse(x,y+o.s*.24,o.s*.65,o.s*.24,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#64748b';ctx.beginPath();ctx.ellipse(x,y,o.s*.58,o.s*.42,-.3,0,Math.PI*2);ctx.fill()}ctx.restore()}
function drawPlayer(p){let x=p.x-cam.x,y=p.y-cam.y;if(x<-80||y<-120||x>innerWidth+80||y>innerHeight+80)return;let color=colorHex[p.color]||'#38bdf8';ctx.save();ctx.fillStyle='rgba(0,0,0,.28)';ctx.beginPath();ctx.ellipse(x,y+22,24,9,0,0,Math.PI*2);ctx.fill();ctx.fillStyle=color;roundRect(x-18,y-4,36,38,12);ctx.fill();ctx.fillStyle=shade(color,-18);roundRect(x-15,y+8,30,25,8);ctx.fill();ctx.fillStyle=color;ctx.beginPath();ctx.arc(x,y-22,19,0,Math.PI*2);ctx.fill();drawHat(p.style,x,y,color);ctx.fillStyle='#06101a';ctx.beginPath();ctx.arc(x-7,y-25,2.6,0,Math.PI*2);ctx.arc(x+7,y-25,2.6,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#06101a';ctx.lineWidth=2;ctx.beginPath();ctx.arc(x,y-18,6,0,Math.PI);ctx.stroke();ctx.font='700 13px system-ui';ctx.textAlign='center';ctx.lineWidth=4;ctx.strokeStyle='rgba(0,0,0,.7)';ctx.strokeText(p.name,x,y-52);ctx.fillStyle=p.id===myId?'#fbbf24':'#fff';ctx.fillText(p.name,x,y-52);if(p.bubble&&Date.now()/1000-(p.bubbleAt||0)<6)drawBubble(x,y-86,p.bubble);ctx.restore()}
function drawHat(style,x,y,color){ctx.save();if(style==='chef'){ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x-10,y-44,9,0,Math.PI*2);ctx.arc(x,y-49,11,0,Math.PI*2);ctx.arc(x+10,y-44,9,0,Math.PI*2);ctx.fill();ctx.fillRect(x-14,y-42,28,8)}else if(style==='mason'){ctx.fillStyle='#f59e0b';roundRect(x-20,y-42,40,12,5);ctx.fill()}else if(style==='cleaner'){ctx.fillStyle='#22c55e';ctx.fillRect(x-18,y-43,36,7);ctx.fillRect(x-12,y-50,24,8)}else if(style==='coder'){ctx.fillStyle='#111827';roundRect(x-20,y-38,40,8,4);ctx.fill();ctx.fillStyle='#38bdf8';ctx.fillRect(x-8,y-39,16,3)}else if(style==='warrior'||style==='knight'){ctx.fillStyle=style==='knight'?'#cbd5e1':'#ef4444';ctx.beginPath();ctx.moveTo(x,y-57);ctx.lineTo(x-20,y-33);ctx.lineTo(x+20,y-33);ctx.closePath();ctx.fill()}else if(style==='merchant'){ctx.fillStyle='#a16207';ctx.fillRect(x-19,y-40,38,7);ctx.fillRect(x-10,y-50,20,11)}else{ctx.fillStyle='rgba(0,0,0,.28)';ctx.beginPath();ctx.arc(x,y-33,22,Math.PI,0);ctx.fill()}ctx.restore()}
function drawBubble(x,y,text){ctx.font='800 14px system-ui';let max=220,words=String(text).slice(0,80);let w=Math.min(max,ctx.measureText(words).width+28);let h=38;let bx=Math.max(10,Math.min(innerWidth-w-10,x-w/2));ctx.fillStyle='rgba(255,255,255,.94)';ctx.strokeStyle='rgba(0,0,0,.18)';ctx.lineWidth=1;roundRect(bx,y,w,h,12);ctx.fill();ctx.stroke();ctx.fillStyle='#111827';ctx.textAlign='center';ctx.fillText(words,bx+w/2,y+24)}
function drawMini(){let w=150,h=102,x=14,y=66;ctx.save();ctx.fillStyle='rgba(8,13,23,.68)';ctx.strokeStyle='rgba(255,255,255,.16)';roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();players.forEach(p=>{ctx.fillStyle=colorHex[p.color]||'#fff';ctx.beginPath();ctx.arc(x+p.x/world.w*w,y+p.y/world.h*h,p.id===myId?4:3,0,Math.PI*2);ctx.fill()});ctx.restore()}
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}
function shade(hex,p){let n=parseInt(hex.slice(1),16),r=(n>>16)+p,g=((n>>8)&255)+p,b=(n&255)+p;return '#'+[r,g,b].map(v=>Math.max(0,Math.min(255,v)).toString(16).padStart(2,'0')).join('')}
addEventListener('beforeunload',()=>{if(myId)navigator.sendBeacon('/leave',new Blob([JSON.stringify({id:myId})],{type:'application/json'}))});
</script>
</body>
</html>
